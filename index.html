<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Superhero Academy Gym Camp</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

  <!-- LEADERBOARD -->
  <header>
    <h1>🏆 Superhero Academy Gym Camp</h1>
    <div id="leaderboardList"></div>
  </header>

  <!-- SETUP + CONTROLS -->
  <div id="controls">
    <button id="addHeroBtn">+ ADD HERO</button>
    <button id="startBtn">START CAMP</button>
  </div>

  <!-- PLAYER GRID -->
  <main>
    <div id="playerGrid"></div>
  </main>

  <!-- MODAL -->
  <div id="heroModal" class="hidden">
    <div class="modalContent">

      <h2>Create Hero</h2>

      <div class="step" id="step1">
        <input type="text" id="heroName" placeholder="Enter name"/>
        <button onclick="nextStep(2)">Next</button>
      </div>

      <div class="step hidden" id="step2">
        <select id="heroDifficulty">
          <option value="1">Sidekick (Easy)</option>
          <option value="1.5">Hero (Medium)</option>
          <option value="2">Superhero (Hard)</option>
          <option value="3">Legend (Extreme)</option>
        </select>
        <button onclick="nextStep(3)">Next</button>
      </div>

      <div class="step hidden" id="step3">
        <div id="avatarGrid"></div>
        <button onclick="createHero()">Create Hero</button>
      </div>

      <button onclick="closeModal()">X</button>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
