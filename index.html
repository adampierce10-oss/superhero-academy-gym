<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superhero Academy Challenge</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

<!-- HOME -->
<section id="screen-home" class="screen active">
  <div class="home-content">
    <h1 class="title">SUPERHERO<br>ACADEMY<br>CHALLENGE</h1>
    <div class="hero-logo">🦸</div>

    <div class="menu">
      <button id="startGameBtn">Start New Game</button>
      <button id="hallBtn">Hall of Heroes</button>
      <button id="settingsBtn">Settings</button>
    </div>

    <div class="version">Version 1.0.0-alpha.5</div>
  </div>
</section>

<!-- PLAYER SETUP -->
<section id="screen-playerSetup" class="screen">

  <h2>Assemble Your Heroes</h2>

  <div id="avatarGrid"></div>

  <div id="playerList"></div>

  <button id="addPlayerBtn">+ Add Hero</button>
  <button id="goRosterBtn">Review Roster</button>
  <button class="backButton">Back</button>
</section>

<!-- ROSTER REVIEW -->
<section id="screen-rosterReview" class="screen">

  <h2>Roster Review</h2>

  <div id="rosterList"></div>

  <button id="startCampBtn">Start Mission</button>
  <button class="backButton">Back</button>

</section>

<!-- COUNTDOWN -->
<section id="screen-countdown" class="screen">
  <h1 id="countdownText">3</h1>
</section>

<!-- GAMEPLAY -->
<section id="screen-gameplay" class="screen">

  <div id="leaderboard"></div>
  <div id="gameArea"></div>

</section>

<!-- RESULTS -->
<section id="screen-results" class="screen">
  <h2>Mission Complete</h2>
  <div id="results"></div>
  <button class="backButton">Home</button>
</section>

<!-- OTHER -->
<section id="screen-hall" class="screen">
  <h2>Hall of Heroes</h2>
  <button class="backButton">Back</button>
</section>

<section id="screen-settings" class="screen">
  <h2>Settings</h2>
  <button class="backButton">Back</button>
</section>

</div>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
